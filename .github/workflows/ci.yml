name: CI - Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'

jobs:
  # Backend Tests
  backend-test:
    name: Backend Tests (Node.js ${{ env.NODE_VERSION }})
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./server
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./server/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint || true
      
      - name: Run tests
        run: npm test
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          directory: ./server/coverage
          fail_ci_if_error: false

  # Flutter Analyze
  flutter-analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./jo_service_app
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Get Flutter dependencies
        run: flutter pub get
      
      - name: Run Flutter analyze
        run: flutter analyze --no-fatal-infos
      
      - name: Run Flutter tests
        run: flutter test
      
      - name: Upload Flutter test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: flutter-test-results
          path: jo_service_app/test_results/

  # Security Audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run npm audit
        uses: oclif/github-artifact-exporter@v1
        run: |
          cd server
          npm audit --audit-level=high || true
        continue-on-error: true
      
      - name: Run Flutter pub outdated
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
        if: false

  # Build Verification
  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [backend-test, flutter-analyze]
    
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      
      - name: Build Flutter APK (Debug)
        run: |
          cd jo_service_app
          flutter pub get
          flutter build apk --debug || true
        continue-on-error: true
      
      - name: Build Flutter iOS (Simulator)
        run: |
          cd jo_service_app
          flutter pub get
          xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 15' -allowProvisioningUpdates build || true
        continue-on-error: true
        if: runner.os == 'macOS'
      
      - name: Verify backend starts
        run: |
          cd server
          timeout 10s npm start || true

  # Notify on Status
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [backend-test, flutter-analyze, security-audit]
    if: always() && github.event_name == 'pull_request'
    
    steps:
      - name: Create status summary
        run: |
          echo "## CI Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Tests: ${{ needs.backend-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Flutter Analysis: ${{ needs.flutter-analyze.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Audit: ${{ needs.security-audit.result }}" >> $GITHUB_STEP_SUMMARY